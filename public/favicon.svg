<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark Cyberpunk Background -->
  <polygon points="10,10 90,10 90,90 10,90" fill="#050510" stroke="#00ff9d" stroke-width="2"/>
  <polygon points="15,15 85,15 85,85 15,85" fill="none" stroke="#ff00ff" stroke-width="1" stroke-dasharray="4,4"/>
  
  <!-- Stylized 'X' for SpectraX -->
  <path d="M 30,30 L 45,50 L 30,70 L 40,70 L 50,55 L 60,70 L 70,70 L 55,50 L 70,30 L 60,30 L 50,45 L 40,30 Z" fill="#00ff9d" />
  
  <!-- Cyberpunk accents -->
  <rect x="75" y="25" width="5" height="15" fill="#ff00ff" />
  <rect x="20" y="60" width="5" height="15" fill="#00e5ff" />
  
  <!-- Glitch slice -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="#ffffff" stroke-width="1" stroke-dasharray="10,5,20,5"/>
</svg>
